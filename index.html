<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSL | Âm Thanh Phù Hoa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --bg-color: #030303;
            --gold-primary: #D4AF37;
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --border-color: #222222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #111111 0%, #000000 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ================= INTRO SCREEN ================= */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        .ysl-logo-intro {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            color: var(--gold-primary);
            letter-spacing: 10px;
            margin-bottom: 30px;
            animation: fadeInOut 3s infinite alternate;
        }

        .enter-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-sub);
            padding: 15px 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            border-color: var(--gold-primary);
            color: var(--gold-primary);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* ================= MAIN APP ================= */
        #main-app {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            color: var(--gold-primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
            margin-top: 20px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        /* Vòng tròn ghi âm (Core UI) */
        .record-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid var(--gold-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
            margin-bottom: 30px;
        }

        .record-circle i {
            font-size: 40px;
            color: var(--gold-primary);
            font-style: normal;
        }

        .record-circle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        /* Hiệu ứng RGB khi đang nghe (ĐỘT PHÁ) */
        .record-circle.listening {
            border: none;
            background: #000;
            animation: rgbPulse 2s infinite, spin 4s linear infinite;
        }

        .record-circle.listening i {
            animation: counterSpin 4s linear infinite;
            color: #fff;
        }

        @keyframes rgbPulse {
            0% { box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, inset 0 0 20px #ff0000; }
            33% { box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00, inset 0 0 20px #00ff00; }
            66% { box-shadow: 0 0 20px #0000ff, 0 0 40px #0000ff, inset 0 0 20px #0000ff; }
            100% { box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, inset 0 0 20px #ff0000; }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes counterSpin { 100% { transform: rotate(-360deg); } }

        /* Dynamic Text Status (Giống Shazam) */
        #dynamic-status {
            font-size: 14px;
            color: var(--gold-primary);
            letter-spacing: 1px;
            min-height: 20px;
            font-weight: 300;
            transition: opacity 0.3s;
        }

        /* ================= RESULTS SECTION ================= */
        .results-container {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
            display: none;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .song-card strong {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--gold-primary);
            margin-bottom: 10px;
        }

        .song-card span {
            font-size: 14px;
            color: var(--text-main);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Nền tảng Buttons */
        .platform-links { display: flex; gap: 8px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
        .platform-btn {
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .platform-btn:hover { transform: translateY(-2px); opacity: 0.8; }
        
        .btn-yt { background: #FF0000; color: white; }
        .btn-ytm { background: #111111; color: white; border: 1px solid #444; }
        .btn-spo { background: #1DB954; color: white; }
        .btn-apl { background: #FA243C; color: white; }

        .dev-info {
            margin-top: auto;
            padding-top: 40px;
            padding-bottom: 20px;
            text-align: center;
            font-size: 10px;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .dev-info span { color: var(--gold-primary); font-family: 'Playfair Display', serif; font-size: 16px; letter-spacing: 5px; }

    </style>
</head>
<body>

    <!-- MÀN HÌNH INTRO -->
    <div id="intro-screen">
        <div class="ysl-logo-intro">YSL</div>
        <button class="enter-btn" onclick="enterApp()">Trải Nghiệm Ngay</button>
    </div>

    <!-- ỨNG DỤNG CHÍNH -->
    <div id="main-app">
        <h1 class="header-title">Giai Điệu Bí Ẩn</h1>
        <p class="subtitle">Powered by YSL Intelligence</p>
        
        <!-- Nút ghi âm hình tròn lớn -->
        <div class="record-circle" id="recordBtn">
            <i id="recordIcon">🎙️</i>
        </div>
        
        <!-- Trạng thái chữ chạy tự động -->
        <div id="dynamic-status">Chạm vào biểu tượng để bắt đầu</div>

        <!-- Kết quả -->
        <div id="resultsArea" class="results-container">
            <div id="songsList"></div>
        </div>

        <div class="dev-info">
            Kiến tạo & Thiết kế bởi<br><span>YSL</span>
        </div>
    </div>

    <script>
        // API KEY
        const API_TOKEN = 'f70ebeccd734a8ebb2f792ad5629cab7';
        
        let mediaRecorder;
        let audioChunks = [];
        let textInterval;
        
        const introScreen = document.getElementById('intro-screen');
        const mainApp = document.getElementById('main-app');
        const recordBtn = document.getElementById('recordBtn');
        const recordIcon = document.getElementById('recordIcon');
        const statusText = document.getElementById('dynamic-status');
        const resultsArea = document.getElementById('resultsArea');
        const songsList = document.getElementById('songsList');

        // Mảng các câu trạng thái AI (Giống Shazam)
        const aiPhrases = [
            "Đang thu nhận dải âm thanh...",
            "Đang lọc tạp âm môi trường...",
            "Đang phân tích cấu trúc giai điệu...",
            "Đang đối chiếu với kho dữ liệu toàn cầu...",
            "Đang tìm kiếm sự trùng khớp..."
        ];

        // Hàm chuyển từ Intro sang Main (Để trình duyệt sẵn sàng cấp quyền Audio)
        function enterApp() {
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                // Trigger animation fade in
                setTimeout(() => mainApp.style.opacity = '1', 100);
            }, 1000);
        }

        recordBtn.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                setUIState('processing');
            } else {
                try {
                    // Cấu hình tối ưu âm thanh: Tắt echoCancellation để lấy tiếng ngân nga thật nhất
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { 
                            echoCancellation: false,
                            autoGainControl: true,
                            noiseSuppression: false 
                        } 
                    });
                    
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        stream.getTracks().forEach(track => track.stop()); 
                        await fetchFromAPI(audioBlob);
                    };

                    mediaRecorder.start();
                    setUIState('recording');
                } catch (err) {
                    alert("YSL cần quyền sử dụng Micro để nhận diện âm thanh. Vui lòng kiểm tra lại cài đặt!");
                }
            }
        });

        // Hàm quản lý giao diện thông minh
        function setUIState(state) {
            clearInterval(textInterval); // Reset vòng lặp chữ

            if (state === 'recording') {
                recordBtn.classList.add('listening');
                recordIcon.innerText = "🎧";
                resultsArea.style.display = 'none';
                
                // Hiệu ứng chữ chạy thay đổi mỗi 2 giây
                let index = 0;
                statusText.innerText = aiPhrases[0];
                textInterval = setInterval(() => {
                    index = (index + 1) % aiPhrases.length;
                    statusText.style.opacity = 0;
                    setTimeout(() => {
                        statusText.innerText = aiPhrases[index];
                        statusText.style.opacity = 1;
                    }, 300);
                }, 2500);

            } else if (state === 'processing') {
                recordBtn.classList.remove('listening');
                recordIcon.innerText = "⏳";
                statusText.innerText = "Đang tổng hợp và giải mã âm thanh...";
            } else if (state === 'done' || state === 'error') {
                recordBtn.classList.remove('listening');
                recordIcon.innerText = "🎙️";
            }
        }

        // Gen link sang các nền tảng khác
        function generateSearchLinks(title, artist) {
            const query = encodeURIComponent(`${title} ${artist}`);
            return `
                <div class="platform-links">
                    <a href="https://www.youtube.com/results?search_query=${query}" target="_blank" class="platform-btn btn-yt">YouTube</a>
                    <a href="https://music.youtube.com/search?q=${query}" target="_blank" class="platform-btn btn-ytm">YT Music</a>
                    <a href="https://open.spotify.com/search/${query}" target="_blank" class="platform-btn btn-spo">Spotify</a>
                    <a href="https://music.apple.com/search?term=${query}" target="_blank" class="platform-btn btn-apl">Apple</a>
                </div>
            `;
        }

        // Gọi API AudD
        async function fetchFromAPI(blob) {
            const formData = new FormData();
            formData.append('api_token', API_TOKEN);
            formData.append('file', blob);

            try {
                const response = await fetch('https://api.audd.io/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                songsList.innerHTML = ''; 

                if (data.status === "success" && data.result) {
                    const song = data.result;
                    songsList.innerHTML = `
                        <div class="song-card">
                            <div style="font-size: 10px; color: #1DB954; margin-bottom: 10px; letter-spacing: 2px;">✔ ĐÃ TÌM THẤY MATCH</div>
                            <strong>${song.title}</strong>
                            <span>${song.artist}</span>
                            ${generateSearchLinks(song.title, song.artist)}
                        </div>
                    `;
                    resultsArea.style.display = 'block';
                    statusText.innerText = "Hoàn tất tìm kiếm!";
                    setUIState('done');
                } else {
                    statusText.innerText = "Chưa tìm thấy dữ liệu. Hãy thử hát to và rõ hơn ở đoạn điệp khúc nhé.";
                    setUIState('error');
                }
            } catch (error) {
                statusText.innerText = "Kết nối máy chủ YSL bị gián đoạn. Vui lòng thử lại.";
                setUIState('error');
            }
        }
    </script>
</body>
</html>
