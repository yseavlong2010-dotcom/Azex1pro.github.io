<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSL | Âm Thanh Phù Hoa</title>
    <style>
        /* Style YSL: Black & Gold Luxury */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --bg-color: #050505;
            --gold-primary: #D4AF37;
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --border-color: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(10, 10, 10, 0.6);
            padding: 50px 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 600px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(15px);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            color: var(--gold-primary);
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--text-sub);
            margin-bottom: 40px;
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Nút Ghi Âm Luxury */
        .record-btn {
            background-color: transparent;
            color: var(--gold-primary);
            border: 1px solid var(--gold-primary);
            padding: 18px 45px;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .record-btn:hover {
            background-color: var(--gold-primary);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        .record-btn.recording {
            background-color: var(--gold-primary);
            color: var(--bg-color);
            animation: goldPulse 1.5s infinite;
            border-color: transparent;
        }

        @keyframes goldPulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        #status {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-sub);
            font-style: italic;
            min-height: 20px;
            letter-spacing: 1px;
        }

        /* Vòng xoay Loading */
        .loader {
            border: 2px solid var(--border-color);
            border-top: 2px solid var(--gold-primary);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Khu vực Kết Quả */
        .results-container { margin-top: 40px; text-align: left; display: none; }
        .results-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--text-sub);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: border-color 0.4s;
            text-align: center;
        }
        .song-card:hover { border-color: var(--gold-primary); }

        .song-info strong { 
            display: block; 
            font-size: 26px; 
            font-family: 'Playfair Display', serif; 
            color: var(--gold-primary); 
            margin-bottom: 8px; 
        }
        .song-info span { 
            font-size: 13px; 
            color: var(--text-main); 
            font-weight: 400; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        /* Nút Liên Kết Đa Nền Tảng */
        .platform-links { display: flex; gap: 10px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
        .platform-btn {
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .platform-btn:hover { transform: translateY(-3px); }
        
        .btn-yt { background: #FF0000; color: white; }
        .btn-ytm { background: #111111; color: white; border-color: #333; }
        .btn-spo { background: #1DB954; color: white; }
        .btn-apl { background: #FA243C; color: white; }

        /* Chữ ký DEV INFO (YSL) */
        .dev-info {
            margin-top: 50px;
            text-align: center;
            font-size: 11px;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .dev-info span {
            color: var(--gold-primary);
            font-weight: 600;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            letter-spacing: 5px;
            display: block;
            margin-top: 5px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Giai Điệu Bí Ẩn</h1>
        <p class="subtitle">Trải nghiệm tìm kiếm âm nhạc đẳng cấp</p>
        
        <button id="recordBtn" class="record-btn">Bắt Đầu Cảm Âm</button>
        <div id="status">Chạm để đánh thức hệ thống</div>
        <div id="loader" class="loader"></div>

        <div id="resultsArea" class="results-container">
            <div class="results-title">Kiệt Tác Được Tìm Thấy</div>
            <div id="songsList"></div>
        </div>
    </div>

    <div class="dev-info">
        Sáng lập & Kiến tạo bởi<br><span>YSL</span>
    </div>

    <script>
        // TOKEN ĐƯỢC BẢO TRÌ BỞI AUDD.IO
        const API_TOKEN = 'f70ebeccd734a8ebb2f792ad5629cab7';
        
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const resultsArea = document.getElementById('resultsArea');
        const songsList = document.getElementById('songsList');
        const loader = document.getElementById('loader');

        recordBtn.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                setUIState('processing');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        // Fix Bug: Dọn rác stream, ngắt kết nối Micro triệt để để tắt đèn đỏ ở trình duyệt
                        stream.getTracks().forEach(track => track.stop()); 
                        await fetchFromAPI(audioBlob);
                    };

                    mediaRecorder.start();
                    setUIState('recording');
                } catch (err) {
                    alert("Quyền truy cập Micro bị từ chối. Vui lòng cấp quyền trong cài đặt trình duyệt để tiếp tục.");
                    console.error("Lỗi Micro: ", err);
                }
            }
        });

        function setUIState(state) {
            if (state === 'recording') {
                recordBtn.classList.add('recording');
                recordBtn.innerText = "DỪNG & PHÂN TÍCH";
                statusDiv.innerText = "Đang lắng nghe... (Hãy hát khoảng 5 - 10 giây)";
                resultsArea.style.display = 'none';
                loader.style.display = 'none';
            } else if (state === 'processing') {
                recordBtn.classList.remove('recording');
                recordBtn.innerText = "BẮT ĐẦU CẢM ÂM";
                statusDiv.innerText = "Hệ thống AI đang đối chiếu dữ liệu âm thanh...";
                loader.style.display = 'block';
            } else if (state === 'done') {
                statusDiv.innerText = "Phân tích hoàn tất.";
                loader.style.display = 'none';
                resultsArea.style.display = 'block';
            } else if (state === 'error') {
                recordBtn.classList.remove('recording');
                recordBtn.innerText = "THỬ LẠI";
                loader.style.display = 'none';
            }
        }

        // Tạo link chuyển hướng tự động sang các nền tảng Streaming
        function generateSearchLinks(title, artist) {
            const query = encodeURIComponent(`${title} ${artist}`);
            return `
                <div class="platform-links">
                    <a href="https://www.youtube.com/results?search_query=${query}" target="_blank" class="platform-btn btn-yt">YouTube</a>
                    <a href="https://music.youtube.com/search?q=${query}" target="_blank" class="platform-btn btn-ytm">YT Music</a>
                    <a href="https://open.spotify.com/search/${query}" target="_blank" class="platform-btn btn-spo">Spotify</a>
                    <a href="https://music.apple.com/search?term=${query}" target="_blank" class="platform-btn btn-apl">Apple</a>
                </div>
            `;
        }

        async function fetchFromAPI(blob) {
            const formData = new FormData();
            formData.append('api_token', API_TOKEN);
            formData.append('file', blob);

            try {
                const response = await fetch('https://api.audd.io/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                songsList.innerHTML = ''; 

                if (data.status === "success" && data.result) {
                    const song = data.result;
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.innerHTML = `
                        <div class="song-info">
                            <strong>${song.title}</strong>
                            <span>${song.artist}</span>
                        </div>
                        ${generateSearchLinks(song.title, song.artist)}
                    `;
                    songsList.appendChild(card);
                    setUIState('done');
                } else {
                    statusDiv.innerText = "Không thể nhận dạng. Vui lòng hát rõ lời hơn hoặc thử đoạn điệp khúc.";
                    setUIState('error');
                }
            } catch (error) {
                console.error("Lỗi API:", error);
                statusDiv.innerText = "Mất kết nối với máy chủ AI. Vui lòng kiểm tra lại mạng Internet.";
                setUIState('error');
            }
        }
    </script>
</body>
</html>
